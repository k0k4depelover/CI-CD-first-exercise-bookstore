version: "3.9"

services:
  # ── Base de datos ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bookvault-db
    environment:
      POSTGRES_DB: bookvault
      POSTGRES_USER: bookvault
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookvault"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bookvault-net

  nginx:
    image: nginx:1-alpine
    ports:
      - "81:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - bookvault-net


  # ── Aplicación ─────────────────────────────────────────────────
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: bookvault-api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bookvault
      DB_USER: bookvault
      DB_PASSWORD: ${DB_PASSWORD}
      APP_PORT: 5000
      LOG_LEVEL: INFO
#    ports:
#      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookvault-net

volumes:
  pgdata:

networks:
  bookvault-net:
    driver: bridge

name: CD-Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

  env:
    IMAGE_NAME: bookstore-api
    IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}


  jobs:
    deploy:
      runs-on: ubuntu-latest
      if: $ {{ github.event.workflow_run.conclusion == 'success' }}

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        - name: Login to GHCR
          uses: docker/login-actions@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: $ {{ secrets.GITHUB_TOKEN }}

        - name: Pull latest image
          run: |
            docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

        - name: Deploy with Docker Compose
          run: docker compose up -d --pull never

        - name: Healthcheck
          run: |
            echo "Ejecutando llamada a la api ..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost/health; then
                echo "Api corriendo correctamente ..."
                exit 0
              fi
                echo "Intento numero $i fallido, reintentando en 6s..."
                sleep 6
            done
            echo "El deploy no ha sido ejecutado correctamente tras 60s..."
            exit 1
